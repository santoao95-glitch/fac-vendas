<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Venda FAC</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="modal">

<h2>🟡 Iniciar venda</h2>

<div class="alerta">
Este formulário será enviado para a organização.
</div>

<label>Itens</label>

<select id="item">
<option>Morfina</option>
<option>Adrenalina</option>
<option>Vírus</option>
<option>Antivírus</option>
</select>

<label>Desconto</label>

<select id="desconto">
<option>Sem desconto</option>
<option>Parceria 10%</option>
<option>Membro 20%</option>
</select>

<label>Quantidade</label>

<input id="quantidade" type="number">

<button id="enviar">
Enviar
</button>

</div>

<script src="script.js"></script>

</body>
</html>
