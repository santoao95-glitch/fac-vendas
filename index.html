<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Venda</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="overlay">

    <div class="modal">

        <div class="header">
            <div class="title">
                <span class="emoji">🟡</span>
                <h2>Iniciar venda</h2>
            </div>

            <button class="close-btn">✕</button>
        </div>

        <div class="warning">
            ⚠️ Este formulário será enviado para a organização. Não compartilhe senhas ou informações confidenciais.
        </div>

        <div class="form-group">
            <label>Itens <span>*</span></label>
            <small>Selecione o item que deseja vender</small>

            <select id="item">
                <option selected disabled>Selecione o item que deseja vender</option>
                <option>Morfina</option>
                <option>Adrenalina</option>
                <option>Bandagem</option>
                <option>Antibiótico</option>
            </select>
        </div>

        <div class="form-group">
            <label>Parceria/Desconto <span>*</span></label>
            <small>Selecione se a venda possui ou não desconto</small>

            <select id="desconto">
                <option selected disabled>Selecione uma opção</option>
                <option>Sem desconto</option>
                <option>Parceria 10%</option>
                <option>Parceria 20%</option>
            </select>
        </div>

        <div class="form-group">
            <label>Quantidade <span>*</span></label>
            <small>Selecione a quantidade que deseja vender</small>

            <input
                id="quantidade"
                type="number"
                placeholder="Informe a quantidade que deseja vender">
        </div>

        <div class="buttons">

            <button class="cancelar">
                Cancelar
            </button>

            <button id="enviar" class="enviar">
                Enviar
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
